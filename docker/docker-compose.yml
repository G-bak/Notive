# Local development services for Notive Phase B.
# Usage:
#   docker compose -f docker/docker-compose.yml up -d
# This brings up Postgres, Redis, and a mail mock that match
# .env.example defaults. The Web/API and Worker themselves run
# locally via `pnpm dev:web` / `pnpm dev:worker` against these
# services.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: notive
      POSTGRES_USER: notive
      POSTGRES_PASSWORD: notive
    ports:
      - "5432:5432"
    volumes:
      - notive-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U notive -d notive"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  mailmock:
    # Lightweight mail catcher for local dev. Real provider is wired
    # via MAIL_PROVIDER_API_KEY in staging/production. Replace as needed.
    image: mailhog/mailhog:v1.0.1
    ports:
      - "1025:1025" # SMTP
      - "8025:8025" # Web UI

volumes:
  notive-postgres:
